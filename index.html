  <style>

    body {

      margin: 0;

    header {

      text-decoration: none;

    }

    .cta {

      background: #0b2c5a;

      color: white;

      padding: 10px 18px;

      border-radius: 5px;

    }

    /* HERO */

    .hero {

      padding: 80px 20px;

      text-align: center;

      background: #f7f9fc;

    }

    .hero h1 {

      font-size: 32px;

      margin-bottom: 10px;

    }

    /* CONTENT */

    .section {

      padding: 60px 20px;

      max-width: 1000px;

      margin: auto;

    }

    /* CTA BLOCK */

    .cta-block {

      background: #0b2c5a;

      color: white;

      text-align: center;

      padding: 50px 20px;

    }

    /* FOOTER */

    footer {

      padding: 30px;

      text-align: center;

      background: #111;

      color: white;

  <!-- HEADER -->

    <p>Conectamos mercados entre México y Europa</p>

  </section>

  <!-- CONTENT -->

  <section class="section">

    <h2>Servicios</h2>

    <p>Importación, logística, proveedores y soluciones B2B.</p>
