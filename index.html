<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Mexal</title>

<style>

/* BASIS */

body {

  margin: 0;

  font-family: Arial, sans-serif;

  color: #0b2c5a; /* LOGO BLAU */

}

/* HEADER */

header {

  position: fixed;

  top: 0;

  width: 100%;

  background: white;

  display: flex;

  align-items: center;

  justify-content: space-between;

  padding: 20px 40px;

  transition: all 0.3s ease;

  z-index: 1000;

  border-bottom: 1px solid #eee;

}

/* LOGO */

.logo img {

  height: 60px;

  transition: all 0.3s ease;

}

/* NAV */

nav a {

  margin: 0 15px;

  text-decoration: none;

  color: #0b2c5a;

  font-weight: 600;

}

/* BUTTON */

.cta {

  background: #0b2c5a;

  color: white;

  padding: 10px 18px;

  border-radius: 5px;

  text-decoration: none;

}

/* SCROLL EFFEKT */

header.scrolled {

  padding: 10px 40px;

}

header.scrolled .logo img {

  height: 40px;

}

/* HERO */

.hero {

  margin-top: 100px;

  padding: 100px 20px;

  text-align: center;

  background: #f7f9fc;

}

.hero h1 {

  font-size: 34px;

  margin-bottom: 10px;

}

/* SECTION */

.section {

  padding: 60px 20px;

  max-width: 1000px;

  margin: auto;

}

/* CTA BLOCK */

.cta-block {

  background: #0b2c5a;

  color: white;

  text-align: center;

  padding: 50px 20px;

}

/* FOOTER */

footer {

  padding: 30px;

  text-align: center;

  background: #111;

  color: white;

}

/* MOBILE */

@media (max-width: 768px) {

  nav {

    display: none;

  }

  header {

    padding: 15px 20px;

  }

}

</style>

</head>

<body>

<!-- HEADER -->

<header id="header">

  <div class="logo">

    <img src="https://i.postimg.cc/9MTb13wx/6746651C-146D-432A-BBD1-E14A15AA4F09.png">

  </div>

  <nav>

    <a href="index.html">Inicio</a>

    <a href="servicios.html">Servicios</a>

    <a href="proceso.html">Proceso</a>

    <a href="nosotros.html">Nosotros</a>

    <a href="contacto.html">Contacto</a>

  </nav>

  <a href="contacto.html" class="cta">Cotización</a>

</header>

<!-- HERO -->

<section class="hero">

  <h1>Importación y comercio internacional</h1>

  <p>Conectamos mercados entre México y Europa</p>

</section>

<!-- CONTENT -->

<section class="section">

  <h2>Servicios</h2>

  <p>Importación, logística, proveedores y soluciones B2B.</p>

</section>

<!-- CTA -->

<section class="cta-block">

  <h2>Solicita tu cotización</h2>

  <a href="contacto.html" class="cta">Contactar</a>

</section>

<!-- FOOTER -->

<footer>

  <p>© 2026 Grupo Mexal</p>

</footer>

<!-- SCRIPT SCROLL -->

<script>

window.addEventListener("scroll", function() {

  var header = document.getElementById("header");

  header.classList.toggle("scrolled", window.scrollY > 50);

});

</script>

</body>

</html>
